name: CodeQL

# Static analysis on push, PR, and a weekly schedule. The `actions`
# language catches GHA-specific issues in this repo's own workflows;
# `javascript-typescript` covers the extension source; `python`
# covers scripts/gen_icon.py.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '45 3 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          category: "/language:${{ matrix.language }}"
