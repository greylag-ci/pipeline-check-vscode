name: CodeQL

# Static analysis on push, PR, and a weekly schedule. The `actions`
# language catches GHA-specific issues in this repo's own workflows;
# `javascript-typescript` covers the extension source; `python`
# covers scripts/gen_icon.py.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '45 3 * * 2'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v4
        with:
          category: "/language:${{ matrix.language }}"
